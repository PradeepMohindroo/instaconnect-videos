kind = "web"
previewPath = "/"
title = "Shoppable Video Admin"
version = "1.0.0"
id = "artifacts/admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin", "run", "build" ]
publicDir = "artifacts/admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
